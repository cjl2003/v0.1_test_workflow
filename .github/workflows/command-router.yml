name: Command Routing

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: command-router-pr-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  route_command:
    if: >-
      github.event.issue.pull_request &&
      (
        startsWith(github.event.comment.body, '/approve-plan') ||
        startsWith(github.event.comment.body, '/codex-fix')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate command and route state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMAND_BODY: ${{ github.event.comment.body }}
          COMMENT_CREATED_AT: ${{ github.event.comment.created_at }}
          COMMENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
        run: python -m tools.command_router
