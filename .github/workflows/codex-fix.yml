name: RTL PR Codex Fix Request

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: codex-fix-request-pr-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  queue_request:
    name: Queue local Codex fix request
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/codex-fix') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Ensure request labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          gh label create codex-fix-pending --repo "${GITHUB_REPO}" --color F9D0C4 --description "Pending local Codex fix request" || true
          gh label create codex-fix-applied --repo "${GITHUB_REPO}" --color 0E8A16 --description "Local Codex fix applied" || true
          gh label create codex-fix-failed --repo "${GITHUB_REPO}" --color D93F0B --description "Local Codex fix attempt failed" || true

      - name: Mark PR as pending local Codex fix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh pr edit "${PR_NUMBER}" --repo "${GITHUB_REPO}" --remove-label codex-fix-applied --remove-label codex-fix-failed || true
          gh pr edit "${PR_NUMBER}" --repo "${GITHUB_REPO}" --add-label codex-fix-pending

      - name: Acknowledge queued request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh pr comment "${PR_NUMBER}" --repo "${GITHUB_REPO}" --body "Received \`/codex-fix\`. The request is queued for local desktop Codex. After Codex pushes a fix commit, the GPT reviewer will run again on the PR."
